services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pvt
      POSTGRES_PASSWORD: pvt
      POSTGRES_DB: painel
    ports:
      # 5433 no host para não conflitar com um Postgres local (que costuma usar 5432).
      # Dentro da rede do compose os serviços seguem falando com "db:5432".
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pvt -d painel"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      # Dentro da rede do compose, o host do banco é o serviço "db" na 5432.
      DATABASE_URL: postgres://pvt:pvt@db:5432/painel
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    environment:
      # O proxy do Vite encaminha /api para o backend pela rede interna do compose.
      VITE_API_TARGET: http://backend:3000
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  pgdata:
